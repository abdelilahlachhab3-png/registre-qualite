services:
  - type: web
    name: registre-qualite
    runtime: docker
    plan: starter
    dockerfilePath: ./Dockerfile
    autoDeploy: true
    healthCheckPath: /api/health
    envVars:
      - key: HOST
        value: 0.0.0.0
      - key: PORT
        value: 10000
      - key: COOKIE_SECURE
        value: true
      - key: ADMIN_USERNAME
        value: admin
      - key: ADMIN_NAME
        value: Administrateur Qualite
      - key: ADMIN_PASSWORD
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: registre-qualite-db
          property: connectionString

databases:
  - name: registre-qualite-db
    plan: starter
